<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OJ PHEV Calculator</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f1115;
    color:white;
    font-family:Arial, sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:#181b22;
    border-radius:15px;
    padding:25px;
    margin-bottom:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
}

input[type=range]{
    width:100%;
}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#000;
    color:white;
    font-size:16px;
}

.value-box{
    margin-top:10px;
    background:#000;
    border:1px solid #3ae7ff;
    box-shadow:0 0 15px rgba(58,231,255,.4);
    border-radius:10px;
    padding:12px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.result{
    color:#3ae7ff;
    font-size:28px;
    font-weight:bold;
}

.info{
    margin-top:15px;
    font-size:18px;
}

hr{
    border-color:#333;
}

</style>

</head>

<body>

<div class="container">

<h1>OMODA JAECOO PHEV CALCULATOR</h1>

<div class="card">

<label>Select Vehicle</label>

<select id="vehicle" onchange="calculate()">

<option value="j7">
J7 PHEV
</option>

<option value="c9">
C9 PHEV
</option>

</select>

</div>

<div class="card">

<label>
Daily Distance Travelled
</label>

<input
type="range"
id="distance"
min="1"
max="200"
value="30"
oninput="calculate()">

<div class="value-box">
<span id="distanceValue">30</span> km/day
</div>

</div>

<div class="card">

<label>
TNB Tariff
</label>

<input
type="range"
id="tariff"
min="0.30"
max="1.00"
step="0.001"
value="0.571"
oninput="calculate()">

<div class="value-box">
RM <span id="tariffValue">0.571</span>/kWh
</div>

</div>

<div class="card">

<h2 id="vehicleTitle">
J7 PHEV
</h2>

<div class="info">
Battery Capacity:
<span id="battery"></span>
</div>

<div class="info">
Fuel Tank Capacity:
<span id="tank"></span>
</div>

<div class="info">
Max Distance:
<span id="range"></span>
</div>

<hr>

<p>Full Charge Cost</p>
<div class="result" id="chargeCost"></div>

<br>

<p>Estimated Cost Per Day</p>
<div class="result" id="costDay"></div>

<br>

<p>Estimated Cost Per Year</p>
<div class="result" id="costYear"></div>

</div>

</div>

<script>

function calculate(){

let vehicle =
document.getElementById("vehicle").value;

let km =
parseFloat(
document.getElementById("distance").value
);

let tariff =
parseFloat(
document.getElementById("tariff").value
);

document.getElementById("distanceValue").innerHTML =
km;

document.getElementById("tariffValue").innerHTML =
tariff.toFixed(3);

let battery;
let tank;
let range;
let name;

if(vehicle==="j7"){

name="J7 PHEV";
battery=18.3;
tank=60;
range=1300;

}else{

name="C9 PHEV";
battery=34.46;
tank=70;
range=1100;

}

let chargeCost =
battery * tariff;

let costDay =
(chargeCost / range) * km;

let costYear =
costDay * 365;

document.getElementById("vehicleTitle").innerHTML =
name;

document.getElementById("battery").innerHTML =
battery + " kWh";

document.getElementById("tank").innerHTML =
tank + " L";

document.getElementById("range").innerHTML =
range + " km";

document.getElementById("chargeCost").innerHTML =
"RM " + chargeCost.toFixed(2);

document.getElementById("costDay").innerHTML =
"RM " + costDay.toFixed(2);

document.getElementById("costYear").innerHTML =
"RM " + costYear.toFixed(2);

}

calculate();

</script>

</body>

</html>
