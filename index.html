<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OMODA JAECOO CHARGING CALCULATOR</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f1115;
    color:white;
    font-family:Arial, sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:#181b22;
    border-radius:15px;
    padding:25px;
    margin-bottom:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

h3{
    color:#3ae7ff;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
}

input[type=range]{
    width:100%;
}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#000;
    color:white;
    font-size:16px;
}

.value-box{
    margin-top:10px;
    background:#000;
    border:1px solid #3ae7ff;
    box-shadow:0 0 15px rgba(58,231,255,.4);
    border-radius:10px;
    padding:12px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.result{
    color:#3ae7ff;
    font-size:28px;
    font-weight:bold;
}

.info{
    margin-top:15px;
    font-size:18px;
}

#salesPitch,
#refuellingPitch{
    font-size:18px;
    line-height:1.6;
}

hr{
    border-color:#333;
}

</style>

</head>

<body>

<div class="container">

<h1>OMODA JAECOO CHARGING CALCULATOR</h1>

<div class="card">

<label>Select Vehicle</label>

<select id="vehicle" onchange="calculate()">
<option value="j7">J7 PHEV</option>
<option value="c9">C9 PHEV</option>
</select>

</div>

<div class="card">

<label>Daily Distance Travelled</label>

<input
type="range"
id="distance"
min="1"
max="200"
value="30"
oninput="calculate()">

<div class="value-box">
<span id="distanceValue">30</span> km/day
</div>

</div>

<div class="card">

<label>TNB Tariff Category</label>

<select id="tariff" onchange="calculate()">

<option value="0.218">
First 200 kWh (RM0.218/kWh)
</option>

<option value="0.334">
Next 100 kWh (201-300) (RM0.334/kWh)
</option>

<option value="0.516">
Next 300 kWh (301-600) (RM0.516/kWh)
</option>

<option value="0.546">
Next 300 kWh (601-900) (RM0.546/kWh)
</option>

<option value="0.571" selected>
Above 900 kWh (RM0.571/kWh)
</option>

</select>

<div class="value-box">
Selected Tariff:
RM <span id="tariffValue">0.571</span>/kWh
</div>

</div>

<div class="card">

<h2 id="vehicleTitle">J7 PHEV</h2>

<div class="info">
Battery Capacity:
<span id="battery"></span>
</div>

<div class="info">
EV Range:
<span id="evRange"></span>
</div>

<div class="info">
Combined Range:
<span id="combinedRange"></span>
</div>

<hr>

<p>Full Charge Cost</p>
<div class="result" id="chargeCost"></div>

<br>

<p>Cost Per KM</p>
<div class="result" id="costPerKm"></div>

<br>

<p>Estimated Electricity Cost Per Day</p>
<div class="result" id="dailyCost"></div>

</div>

<div class="card">

<h3>Your Weekly Charging Cost</h3>

<p id="salesPitch"></p>

</div>

<div class="card">

<h3>Estimated Refuelling Frequency</h3>

<p id="refuellingPitch"></p>

</div>

</div>

<script>

function calculate(){

let vehicle =
document.getElementById("vehicle").value;

let km =
parseFloat(
document.getElementById("distance").value
);

let tariff =
parseFloat(
document.getElementById("tariff").value
);

document.getElementById("distanceValue").innerHTML =
km;

document.getElementById("tariffValue").innerHTML =
tariff.toFixed(3);

let battery;
let evRange;
let combinedRange;
let fuelTank;
let name;

if(vehicle==="j7"){

name="J7 PHEV";
battery=18.3;
evRange=106;
combinedRange=1300;
fuelTank=60;

}else{

name="C9 PHEV";
battery=34.46;
evRange=169;
combinedRange=1100;
fuelTank=70;

}

let chargeCost =
battery * tariff;

let costPerKm =
chargeCost / evRange;

let dailyCost =
costPerKm * km;

let weeklyDistance =
km * 5;

let weeklyCost =
dailyCost * 5;

let daysBeforeRefuel =
combinedRange / km;

document.getElementById("vehicleTitle").innerHTML =
name;

document.getElementById("battery").innerHTML =
battery + " kWh";

document.getElementById("evRange").innerHTML =
evRange + " km";

document.getElementById("combinedRange").innerHTML =
combinedRange + " km";

document.getElementById("chargeCost").innerHTML =
"RM " + chargeCost.toFixed(2);

document.getElementById("costPerKm").innerHTML =
"RM " + costPerKm.toFixed(3);

document.getElementById("dailyCost").innerHTML =
"RM " + dailyCost.toFixed(2);

document.getElementById("salesPitch").innerHTML =
"With your daily commute of <b>" +
km +
" km</b>, you travel approximately <b>" +
weeklyDistance +
" km per week</b> (based on 5 working days).<br><br>You will only spend approximately <b>RM " +
weeklyCost.toFixed(2) +
"</b> per week on charging.";

document.getElementById("refuellingPitch").innerHTML =
"With a full charge and full tank, the <b>" +
name +
"</b> offers a combined driving range of <b>" +
combinedRange +
" km</b>.<br><br>Based on your daily travel of <b>" +
km +
" km</b>, the full combined capacity can last approximately <b>" +
Math.round(daysBeforeRefuel) +
" days</b>.";

}

calculate();

</script>

</body>

</html>
